# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# https://github.com/r-lib/actions/blob/v2/examples/lint.yaml (2024-09-30)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: lint

permissions: read-all

jobs:
  lint:
    runs-on: macos-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2.11.4

      - uses: r-lib/actions/setup-renv@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2.11.4

      - name: Install current package
        run: remotes::install_local(".", upgrade = "never")
        shell: Rscript {0}

      - name: Lint all files
        run: lintr::lint_dir(path = ".", exclusions = list("renv", "packrat", "R/RcppExports.R"))
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
